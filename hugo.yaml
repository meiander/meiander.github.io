baseURL: "https://meiander.github.io/"
title: "meiander'log"
theme: "PaperMod"

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
pygmentsUseClasses: true

pagination:
  pagerSize: 20

minify:
  disableXML: true
  minifyOutput: true

taxonomies:
  category: categories
  tag: tags
  series: series

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: false
    style: monokai
  tableOfContents:
    startLevel: 2
    endLevel: 4
    ordered: false

outputs:
  home: ["HTML", "RSS", "JSON"]

params:
  env: production
  title: "meiander'log"
  description: "A meandering log of ideas, notes, and experiments."
  keywords: [blog, notes, ml, ai]
  author: "meiander"
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  ShowToc: true
  TocOpen: false
  math: true
  comments: false

  homeInfoParams:
    Title: "meiander'log"
    Content: >
      A meandering log of ideas, notes, and experiments.

  socialIcons:
    - name: github
      url: "https://github.com/meiander"
    - name: rss
      url: "index.xml"

  editPost:
    URL: "https://github.com/meiander/meianderlog/tree/main/content"
    Text: "Suggest changes"
    appendFilePath: true

  assets:
    disableHLJS: true
    favicon: "/favicon.ico"

menu:
  main:
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 10
    - identifier: search
      name: Search
      url: /search/
      weight: 20
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 30
